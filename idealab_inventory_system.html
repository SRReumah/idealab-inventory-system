<!DOCTYPE html>
<html>
<head>
<title>IDEALab Inventory Management System</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a; /* solid dark navy */
    margin: 0;
    padding: 30px;
    color: #e2e8f0;
}

h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 25px;
    letter-spacing: 1px;
    color: #f8fafc;
}

.container {
    max-width: 1000px;
    margin: auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
}

.section {
    margin-bottom: 40px;
}

h3 {
    margin-bottom: 10px;
    color: #38bdf8;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 14px;
}

input::placeholder {
    color: #94a3b8;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #38bdf8;
    color: #0f172a;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background: #0ea5e9;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: #0f172a;
    border-radius: 8px;
    overflow: hidden;
}

th {
    background: #334155;
    color: #f8fafc;
    padding: 12px;
    text-align: center;
}

td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #1e293b;
}

tr:nth-child(even) td {
    background: #1e293b;
}

tr:hover td {
    background: #334155;
}

#statusMessage {
    text-align: center;
    font-weight: bold;
    margin-bottom: 20px;
    font-size: 14px;
}

.summary {
    text-align: right;
    font-size: 13px;
    color: #94a3b8;
}
</style></head>

<body>

<h1>IDEALab Component Borrowing System</h1>

<p id="statusMessage"></p>

<div class="container">

<div class="section">
<h3>📦 Current Inventory</h3>
<table id="inventoryTable"></table>
</div>

<div class="section">
<h3>📝 Request Component</h3>
<input type="text" id="studentName" placeholder="Enter Student Name">
<select id="componentSelect"></select>
<input type="number" id="quantity" placeholder="Enter Quantity">
<button onclick="borrowItem()">Request / Borrow</button>
</div>

<div class="section">
<h3>📋 Borrowed Records</h3>
<div class="summary">Active Transactions: <span id="totalBorrowed">0</span></div>
<table id="borrowTable"></table>
</div>

</div>

<script>

let inventory = {
    "Arduino Uno": 12,
    "ESP32": 10,
    "Raspberry Pi": 5,
    "Ultrasonic Sensor": 20,
    "Jumper Wires": 30
};

let borrowed = [];

/* Load Inventory */
function loadInventory() {
    let table = "<tr><th>Component</th><th>Available</th></tr>";
    for (let item in inventory) {
        table += `<tr><td>${item}</td><td>${inventory[item]}</td></tr>`;
    }
    document.getElementById("inventoryTable").innerHTML = table;

    let select = document.getElementById("componentSelect");
    select.innerHTML = "";
    for (let item in inventory) {
        select.innerHTML += `<option value="${item}">${item}</option>`;
    }
}

/* Borrow Component */
function borrowItem() {

    let name = document.getElementById("studentName").value.trim();
    let component = document.getElementById("componentSelect").value;
    let qty = parseInt(document.getElementById("quantity").value);

    if (name === "" || isNaN(qty) || qty <= 0) {
        showStatus("Please enter valid details.", "red");
        return;
    }

    if (inventory[component] >= qty) {

        let transactionId = "TXN" + Math.floor(Math.random() * 100000);
        let borrowDate = new Date().toLocaleString();

        inventory[component] -= qty;

        borrowed.push({
            id: transactionId,
            name: name,
            component: component,
            qty: qty,
            date: borrowDate
        });

        showStatus("Borrow successful! Transaction ID: " + transactionId, "lightgreen");

        document.getElementById("studentName").value = "";
        document.getElementById("quantity").value = "";

        loadInventory();
        loadBorrowed();

    } else {
        showStatus("Not enough stock available.", "red");
    }
}

/* Load Borrowed Table */
function loadBorrowed() {

    let table = "<tr><th>Transaction ID</th><th>Student</th><th>Component</th><th>Quantity</th><th>Date</th><th>Return</th></tr>";

    borrowed.forEach((entry, index) => {
        table += `
        <tr>
            <td>${entry.id}</td>
            <td>${entry.name}</td>
            <td>${entry.component}</td>
            <td>${entry.qty}</td>
            <td>${entry.date}</td>
            <td><button onclick="returnItem(${index})">Return</button></td>
        </tr>`;
    });

    document.getElementById("borrowTable").innerHTML = table;
    document.getElementById("totalBorrowed").innerText = borrowed.length;
}

/* Return Component */
function returnItem(index) {

    let returnedItem = borrowed[index];

    inventory[returnedItem.component] += returnedItem.qty;

    showStatus("Returned successfully! Transaction ID: " + returnedItem.id, "lightblue");

    borrowed.splice(index, 1);

    loadInventory();
    loadBorrowed();
}

/* Status Message */
function showStatus(message, color) {
    let status = document.getElementById("statusMessage");
    status.innerText = message;
    status.style.color = color;
}

/* Initialize */
loadInventory();

</script>

</body>
</html>
